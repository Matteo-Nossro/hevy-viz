server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback — toutes les routes inconnues renvoient index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy API vers PostgREST
  # Le préfixe /api/ est strippé par proxy_pass (trailing slash)
  location /api/ {
    proxy_pass http://postgrest:3000/;
    proxy_set_header Host $host;

    # Forward du header X-Username envoyé par le frontend (auth légère via RLS)
    proxy_set_header X-Username $http_x_username;

    # Headers PostgREST pour cibler le schéma 'api'
    proxy_set_header Accept-Profile api;
    proxy_set_header Content-Profile api;
  }

  # Headers de sécurité basiques
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
}
