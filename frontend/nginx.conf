# Rate limit zones — déclarées au niveau http (conf.d est inclus dans http {}).
# Anti-brute-force sur les endpoints d'auth (login / register / bootstrap_password).
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
# Rate limit général sur l'API (lecture/écriture data) — protège contre l'abus.
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  limit_req_status 429;

  # SPA fallback — toutes les routes inconnues renvoient index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Endpoints d'auth : rate limit stricte (5 req/s, burst 5) pour bloquer le
  # brute-force password. Doit être avant le location /api/ générique.
  location ~ ^/api/rpc/(login|register|bootstrap_password)$ {
    limit_req zone=auth burst=5 nodelay;
    proxy_pass http://postgrest:3000/rpc/$1;
    proxy_set_header Host $host;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header Accept-Profile api;
    proxy_set_header Content-Profile api;
  }

  # Proxy API vers PostgREST. Le préfixe /api/ est strippé par proxy_pass (trailing slash).
  location /api/ {
    limit_req zone=api burst=20 nodelay;
    proxy_pass http://postgrest:3000/;
    proxy_set_header Host $host;

    # Forward du Bearer token vers PostgREST (résolu côté DB par
    # api.current_user_id() contre la table api.sessions).
    proxy_set_header Authorization $http_authorization;

    # Headers PostgREST pour cibler le schéma 'api'
    proxy_set_header Accept-Profile api;
    proxy_set_header Content-Profile api;
  }

  # Headers de sécurité
  add_header X-Frame-Options        "SAMEORIGIN"                          always;
  add_header X-Content-Type-Options "nosniff"                             always;
  add_header Referrer-Policy        "strict-origin-when-cross-origin"     always;
  add_header Permissions-Policy     "geolocation=(), camera=(), microphone=(), payment=()" always;
  # CSP : self uniquement. Tailwind v3 produit du CSS statique (pas inline) ;
  # 'unsafe-inline' pour style-src couvre les styles inline du HTML (ex. logo gradient).
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; font-src 'self' data:; manifest-src 'self'; worker-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
  # HSTS : 1 an. Applicable seulement si TLS terminé en amont (Proxmox nginx).
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}
