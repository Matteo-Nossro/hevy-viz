services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # Transmis au script 04_set_password.sh pour ALTER ROLE authenticator
      PGRST_AUTHENTICATOR_PASSWORD: ${PGRST_AUTHENTICATOR_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgrest:
    image: postgrest/postgrest:v12.2.0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:${PGRST_AUTHENTICATOR_PASSWORD}@db:5432/${POSTGRES_DB}
      PGRST_DB_SCHEMAS: api
      PGRST_DB_ANON_ROLE: web_user
      PGRST_DB_MAX_ROWS: ""
      PGRST_OPENAPI_SERVER_PROXY_URI: http://localhost:${HTTP_PORT}/api

  frontend:
    image: ghcr.io/matteo-nossro/hevy-viz-frontend:latest
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - postgrest
    ports:
      - "${HTTP_PORT}:80"

  adminer:
    image: adminer:standalone
    restart: unless-stopped
    depends_on:
      - db
    environment:
      ADMINER_DEFAULT_SERVER: db
      ADMINER_DESIGN: dracula
    ports:
      - "${ADMINER_PORT}:8080"

volumes:
  db_data:
    external: true
    name: 21_db_data
